# React Native's autolinking CLI assumes a flat, hoisted node_modules — a native dependency
# nested several levels deep (e.g. a third-party RN library that is only a dependency of one
# of our own packages, never the consuming app's own package.json) never gets hoisted to the
# app's own node_modules root under pnpm's default isolated store, so the RN CLI's autolinking
# scan (which only walks the app's own tree) never finds it.
#
# Deliberately NOT nodeLinker: hoisted + shamefullyHoist (tried and reverted — see git history):
# that switches pnpm's whole linking algorithm to npm-classic-style deduplication, which also
# stops guaranteeing a package's OWN direct dependencies a local symlink in its own
# node_modules. React Native's generated `android/settings.gradle` hardcodes a literal relative
# path (`../node_modules/@react-native/gradle-plugin`) assuming exactly that guarantee, so full
# hoisting broke every app's Android build the moment a direct devDependency stopped getting
# its own local copy. publicHoistPattern only ADDS extra root-level symlinks for matching
# packages on top of the normal per-package isolated behavior — it does not touch that guarantee.
publicHoistPattern:
  - '*react-native*'
packages:
  - 'core/*'
  - 'adapters/*'
  - 'packages/*'
  - 'apps/*'
  # Gitignored dev harness — listing it lets pnpm manage it as a real workspace project
  # (bin-linking, .pnpm-store symlinks) instead of the ad-hoc node_modules it otherwise
  # ends up with.
  - '.examples/*'
allowBuilds:
  '@parcel/watcher': true
  detox: true
  dtrace-provider: true
  esbuild: true
  sharp: true
minimumReleaseAgeExclude:
  - prettier@3.9.1
  - '@symbiote-native/angular@0.3.3'
  - '@symbiote-native/components@0.2.3'
  - '@symbiote-native/css-parser@0.2.1'
  - '@symbiote-native/engine@0.1.4'
  - '@symbiote-native/react@0.2.4'
  - '@symbiote-native/slider@2.0.5'
  - '@symbiote-native/vue@0.3.3'
  - '@symbiote-native/test-utils@0.1.5'
  - '@symbiote-native/splash-screen@0.1.3'

# Single source of truth for dependency versions (pnpm catalogs).
# A package references a version with `catalog:` (default) or `catalog:<name>`
# instead of a literal, so a bump happens HERE, in one place. The guard that
# nobody slips a literal version past this file is syncpack (`pnpm deps:check`).
#
# peerDependencies are deliberately NOT catalogued — they are compatibility
# ranges (`>=19.0.0`, `>=0.86`) a consumer satisfies, not a pinned version.
catalog:
  # framework runtimes — exactly one copy across the monorepo (the RN/react
  # singleton the `overrides` below also guards transitively)
  react: 19.2.3
  react-native: 0.86.0
  react-reconciler: ^0.33.0
  '@vue/runtime-core': ^3.5.13
  '@vue/compiler-sfc': ^3.5.13
  '@vue/compiler-core': ^3.5.13
  '@vue/babel-plugin-jsx': ^1.5.0
  vue: ^3.5.38
  vue-tsc: ^2.2.12
  '@angular/core': ^22
  '@angular/common': ^22
  '@angular/compiler': ^22
  '@angular/compiler-cli': ^22

  # type packages
  '@types/react': ^19.2.0
  '@types/react-reconciler': ^0.32.2
  '@types/jest': ^29.5.12
  '@types/node': ^26.0.0

  # workspace tooling (builds/lints/tests the library packages)
  '@changesets/cli': ^2.31.0
  pkg-pr-new: ^0.0.75
  typescript: ~6.0.0
  vitest: ^4.1.9
  eslint: ^10.6.0
  prettier: ^3.9.1
  '@eslint/js': ^10.0.1
  eslint-config-prettier: ^10.1.8
  eslint-plugin-react-hooks: ^7.1.1
  typescript-eslint: ^8.62.0
  globals: ^17.7.0
  husky: ^9.1.7
  lint-staged: ^17.0.8
  syncpack: ^15.3.2
  postcss: ^8.4.49
  postcss-value-parser: ^4.2.0
  # optional CSS preprocessors — devDependencies of core/css-parser ONLY, never a dependency of
  # that package or any consuming app
  sass: ^1.101.0
  less: ^4.6.7
  stylus: ^0.64.0
  '@types/less': ^3.0.8
  '@types/stylus': ^0.48.43

  # Documentation site toolchain — used only by apps/docs-site
  astro: ^7.0.3
  '@astrojs/starlight': ^0.41.1
  '@astrojs/check': ^0.9.9

  # Published @symbiote-native/* packages. examples/* left the pnpm workspace (2026-07) to
  # become standalone `npm install`-able apps free of pnpm's blockExoticSubdeps guard — its
  # package.json files now carry literal versions/pkg.pr.new URLs directly, not `catalog:`.
  # These entries remain for .examples/angular's own css-parser dep and stay in lock-step
  # with each package's release train; internal cross-package deps between
  # core/adapters/packages stay workspace:* (see .syncpackrc.json).
  '@symbiote-native/react': latest
  '@symbiote-native/vue': latest
  '@symbiote-native/angular': latest
  '@symbiote-native/engine': latest
  '@symbiote-native/components': latest
  '@symbiote-native/css-parser': latest
  '@symbiote-native/slider': latest
  '@symbiote-native/splash-screen': latest
  '@symbiote-native/test-utils': latest

  # React Native app toolchain — single-versioned. examples/* left the workspace (see above);
  # entries here stay for @react-native/metro-babel-transformer (a real dependency of
  # @symbiote-native/css-parser itself) and anything else the remaining workspace still needs.
  '@react-native/babel-preset': 0.86.0
  '@react-native/metro-config': 0.86.0
  # Real dependency of @symbiote-native/css-parser (createCssMetroTransformer resolves it itself),
  # not just examples/* — see core/css-parser/src/metro-transformer.ts.
  '@react-native/metro-babel-transformer': 0.86.0
  '@react-native/eslint-config': 0.86.0
  '@react-native/typescript-config': 0.86.0
  '@react-native/gradle-plugin': 0.86.0
  '@react-native/codegen': 0.86.0
  '@react-native/new-app-screen': 0.86.0
  '@react-native-community/cli': 20.1.0
  '@react-native-community/cli-platform-android': 20.1.0
  '@react-native-community/cli-platform-ios': 20.1.0
  # Exact pins, not caret ranges — same reason as react-native-screens below: packages/slider and
  # packages/splash-screen vendor these libraries' codegen JS specs into a published
  # codegen-specs/ snapshot (scripts/vendor-codegen-specs.cjs), and a caret range lets a
  # standalone examples/* consumer's own npm install silently drift its NATIVE side ahead of
  # that snapshot. No drift observed yet (both examples/* and this workspace currently resolve
  # the same 5.2.0/7.3.2), but the class of failure is proven (react-native-screens, 2026-07-15)
  # and silent at both ends until a real device/simulator build — pin here to close it off before
  # it happens, not after.
  '@react-native-community/slider': 5.2.0
  react-native-bootsplash: 7.3.2
  react-native-is-edge-to-edge: ^1.3.1
  # Exact pin, not a caret range: @symbiote-native/navigation vendors this library's codegen JS
  # specs into its own published codegen-specs/ at prepare time (see
  # scripts/vendor-codegen-specs.cjs) — a floating range let a standalone `npm install` consumer
  # (examples/*, outside this pnpm workspace) resolve a NEWER react-native-screens than whatever
  # this workspace last vendored from, so the consumer's native .rn-screens (podspec-vendored
  # fresh from THEIR install) referenced codegen types (e.g. RNSSplitHostColorScheme, added in
  # 4.26.0) that our stale 4.25.2-vendored codegen-specs never generated Props.h entries for —
  # `error: no type named 'RNSSplitHostColorScheme' in namespace 'facebook::react'` at pod-install
  # time, with zero warning at either version's own install. An exact pin here + republishing
  # @symbiote-native/navigation on every bump keeps codegen-specs and any consumer's native source
  # permanently in lockstep — see .claude/rules/native-proxy-package-files.md.
  react-native-screens: 4.26.0
  react-native-safe-area-context: ^5.5.2
  '@babel/core': ^7.25.2
  '@types/babel__core': ^7.20.5
  '@babel/preset-env': ^7.25.3
  '@babel/runtime': ^7.25.0
  jest: ^29.7.0
  jest-circus: ^29.7.0
  ts-jest: ^29.4.11
  detox: ^20.51.4

catalogs:
  # eslint is the ONE dependency that cannot share the workspace version:
  # @react-native/eslint-config@0.86 peers `eslint ^8 || ^9` (never 10) and the
  # examples lint through legacy `.eslintrc.js`; eslint 10 no longer reads it
  # (flat-config only). Collapsing to eslint 10 needs both a flat-config rewrite
  # of every example AND an eslint-10-capable RN config upstream.
  # prettier and typescript ARE unified in the default catalog (typescript pinned
  # to `~6.0.0` — Angular 22's compiler peers `>=6.0 <6.1`, and typescript-eslint
  # peers `<6.1.0`, so the tilde range keeps every consumer inside both ceilings).
  # RN's config peers `prettier >=2`, so prettier 3 is fine.
  rn-app:
    eslint: ^8.19.0

overrides:
  # One react copy across the monorepo (matches the canary pin) so the adapter's
  # reconciler and app elements/hooks share one instance — otherwise Vitest hits
  # "Invalid hook call". `catalog:` keeps this in lock-step with catalog.react.
  # The catalog handles direct declarations; this override handles transitive
  # react pulled in by any nested dependency.
  react: 'catalog:'

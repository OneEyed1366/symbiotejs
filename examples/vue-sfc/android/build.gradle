buildscript {
    // Detox (e2e, decision 0025): rninfo.gradle exposes RN version metadata Detox's AAR needs.
    // `detox` is a direct devDep of this app, so pnpm symlinks it under ./node_modules.
    apply from: "../node_modules/detox/android/rninfo.gradle"
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        // expo-modules-core's and expo-sensors' own android/build.gradle both `apply plugin:
        // 'expo-module-gradle-plugin'` (old-style) and `import` its ExpoModuleExtension directly —
        // old-style `apply plugin:` only resolves an external plugin's classes via this classic
        // shared root-buildscript-classpath convention, not via pluginManagement's composite-build
        // substitution alone (settings.gradle handles the composite-build inclusion; this line is
        // separate and both are required).
        classpath("expo.modules:expo-module-gradle-plugin")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        // Detox AAR (resolves after `pnpm add -D detox` symlinks ./node_modules/detox).
        maven { url "$rootDir/../node_modules/detox/Detox-android" }
    }
}

apply plugin: "com.facebook.react.rootproject"

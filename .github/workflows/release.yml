name: Release

on:
  push:
    branches:
      - master
  # Drives publish-canary below — reacts to the CI workflow's own completion
  # instead of re-declaring `pull_request` here, which would call checks.yml
  # a second time for every PR push (ci.yml already covers pull_request; there
  # is no cross-workflow `needs:` to gate on its run directly, so workflow_run
  # is the mechanism that avoids running lint/typecheck/test twice per push).
  # Caveat: workflow_run only fires from the copy of this trigger present on
  # the repo's DEFAULT branch — a PR from a non-default branch won't exercise
  # this path until the change is merged.
  workflow_run:
    workflows: ['CI']
    types: [completed]
  workflow_dispatch:
    inputs:
      cut-release:
        description: 'Cut a release: open a version-bump PR from this branch into master (run this dispatched from develop)'
        type: boolean
        default: false
      publish-canary:
        description: 'Manually publish a pkg.pr.new preview build of every publishable package on this branch'
        type: boolean
        default: false

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  # Same three jobs ci.yml runs for fast PR feedback, re-run here so `needs:
  # checks` below is a real gate for `release`/`cut-release` (push /
  # workflow_dispatch only — those events never went through ci.yml, so this
  # is genuinely the first and only checks.yml run for them). Restricted to
  # those two events so it does NOT also fire on workflow_run — publish-canary
  # below gates on ci.yml's own conclusion instead of needing this job, which
  # is the whole point of using workflow_run rather than a local `needs:`.
  checks:
    name: Checks
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/checks.yml

  release:
    needs: checks
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Opens/updates a "chore: version packages" PR when unreleased changesets
      # exist on master; once that PR is merged, this same step runs `publish`
      # instead and pushes the bumped packages to npm.
      - name: Version or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
          commit: 'chore: version packages'
          title: 'chore: version packages'
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # changesets/action creates one GitHub Release per published package by
      # default (no built-in grouping option exists as of 2026 - see
      # changesets/action#504, still unmerged). We disable that above and
      # create a single dated release listing every package bumped in this run.
      - name: Create combined GitHub release
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          TAG="release-${DATE}-${{ github.run_number }}"
          BODY=$(echo "$PACKAGES" | node -e '
            const pkgs = JSON.parse(require("fs").readFileSync(0, "utf8"));
            console.log(pkgs.map(p => `- ${p.name}@${p.version}`).join("\n"));
          ')
          gh release create "$TAG" \
            --target "${{ github.sha }}" \
            --title "Release ${DATE}" \
            --notes "$BODY"

  # Manual: dispatched with the `develop` branch selected, opens a version-bump
  # PR from that branch straight into master (changesets/action's `branch`
  # input sets the PR's base — the checkout stays on whatever branch the
  # dispatch ran against, so no hardcoded ref here). Only versions, never
  # publishes: the existing push-to-master `release` job below picks up the
  # merge of that PR (no pending changesets left → it publishes directly).
  cut-release:
    needs: checks
    if: github.event_name == 'workflow_dispatch' && inputs.cut-release == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Open version-bump PR into master
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          branch: master
          commit: 'chore: version packages'
          title: 'chore: version packages'
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Preview publish of every publishable package via pkg.pr.new — WITHOUT touching the real npm
  # registry at all. pkg.pr.new hosts its own npm-compatible per-commit URLs, so nothing here is
  # ever visible on npmjs.com: no dist-tag, no version bump, nothing to clean up. That last point
  # is load-bearing, not incidental — an earlier version of this job published real npm snapshots
  # under a `canary` dist-tag instead, which turned out to be a dead end: real npm's `unpublish`
  # and `deprecate` both require an interactive OTP that a headless CI job can never supply, and
  # this holds even for a granular access token with "bypass 2FA" enabled — that bypass only ever
  # covers `npm publish`, never `unpublish`/`deprecate` (confirmed empirically, not just from
  # docs, against this repo's own packages on 2026-07-24). So real npm snapshots would have
  # accumulated on the registry forever with no working automated cleanup. pkg.pr.new sidesteps
  # the whole problem by never touching the real registry in the first place.
  #
  # Publishes ALL publishable packages every time rather than a hand-picked subset: unlike a real
  # npm publish, pkg.pr.new never mutates shared registry state (no dist-tag to move, no cascade
  # via `updateInternalDependencies` to reason about), so there's no staleness/cascade risk a
  # selection would need to guard against — publishing everything is simply the cheapest, always-
  # accurate option. Requires the pkg.pr.new GitHub App installed on this repo
  # (github.com/apps/pkg-pr-new).
  #
  # Two ways in: automatic (workflow_run, gated on `CI` having passed for the PR) or manual
  # (workflow_dispatch with publish-canary: true, for a branch with no open PR, or to retry).
  #
  # `needs: checks` gates the workflow_dispatch path on Lint/Typecheck/Test — without it, a manual
  # dispatch would publish regardless of whether those passed. The `checks` job's own `if:` never
  # runs it for workflow_run (ci.yml already covered that PR push), so its result there is
  # 'skipped', not 'success' — the explicit needs.checks.result check below tolerates that instead
  # of the implicit success()-only gate `needs:` alone would apply, which would silently skip this
  # job on every workflow_run.
  publish-canary:
    needs: checks
    if: >-
      (needs.checks.result == 'success' || needs.checks.result == 'skipped') &&
      (
        (github.event_name == 'workflow_run' &&
          github.event.workflow_run.event == 'pull_request' &&
          github.event.workflow_run.conclusion == 'success') ||
        (github.event_name == 'workflow_dispatch' && inputs.publish-canary == true)
      )
    runs-on: ubuntu-latest
    environment: canary-publish
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run prepublish-build

      # pkg-pr-new's own glob resolution only matches directories, and it packs them itself,
      # defaulting to `npm pack` unless told otherwise. `--pnpm` makes it use `pnpm pack`, which
      # — unlike `npm pack` — resolves each package's `publishConfig` override (ships `build/`,
      # not the in-repo `src/*.ts` entry).
      - name: Resolve publishable package directories
        id: dirs
        run: node scripts/select-canary-dirs.mjs

      - name: Publish canary (pkg.pr.new)
        run: pnpm exec pkg-pr-new publish --pnpm ${{ steps.dirs.outputs.dirs }}

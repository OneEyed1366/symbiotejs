name: Release

on:
  push:
    branches:
      - master
  # Drives publish-canary below — reacts to the CI workflow's own completion
  # instead of re-declaring `pull_request` here, which would call checks.yml
  # a second time for every PR push (ci.yml already covers pull_request; there
  # is no cross-workflow `needs:` to gate on its run directly, so workflow_run
  # is the mechanism that avoids running lint/typecheck/test twice per push).
  # Caveat: workflow_run only fires from the copy of this trigger present on
  # the repo's DEFAULT branch — a PR from a non-default branch won't exercise
  # this path until the change is merged.
  workflow_run:
    workflows: ['CI']
    types: [completed]
  workflow_dispatch:
    inputs:
      cut-release:
        description: 'Cut a release: open a version-bump PR from this branch into master (run this dispatched from develop)'
        type: boolean
        default: false
      publish-canary:
        description: 'Manually run a canary publish for whatever pending changesets exist on this branch (internal-dependency cascade included, same as a real release)'
        type: boolean
        default: false

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  # Same three jobs ci.yml runs for fast PR feedback, re-run here so `needs:
  # checks` below is a real gate for `release`/`cut-release` (push /
  # workflow_dispatch only — those events never went through ci.yml, so this
  # is genuinely the first and only checks.yml run for them). Restricted to
  # those two events so it does NOT also fire on workflow_run — publish-canary
  # below gates on ci.yml's own conclusion instead of needing this job, which
  # is the whole point of using workflow_run rather than a local `needs:`.
  checks:
    name: Checks
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/checks.yml

  release:
    needs: checks
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Opens/updates a "chore: version packages" PR when unreleased changesets
      # exist on master; once that PR is merged, this same step runs `publish`
      # instead and pushes the bumped packages to npm.
      - name: Version or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
          commit: 'chore: version packages'
          title: 'chore: version packages'
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # changesets/action creates one GitHub Release per published package by
      # default (no built-in grouping option exists as of 2026 - see
      # changesets/action#504, still unmerged). We disable that above and
      # create a single dated release listing every package bumped in this run.
      - name: Create combined GitHub release
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          TAG="release-${DATE}-${{ github.run_number }}"
          BODY=$(echo "$PACKAGES" | node -e '
            const pkgs = JSON.parse(require("fs").readFileSync(0, "utf8"));
            console.log(pkgs.map(p => `- ${p.name}@${p.version}`).join("\n"));
          ')
          gh release create "$TAG" \
            --target "${{ github.sha }}" \
            --title "Release ${DATE}" \
            --notes "$BODY"

  # Manual: dispatched with the `develop` branch selected, opens a version-bump
  # PR from that branch straight into master (changesets/action's `branch`
  # input sets the PR's base — the checkout stays on whatever branch the
  # dispatch ran against, so no hardcoded ref here). Only versions, never
  # publishes: the existing push-to-master `release` job below picks up the
  # merge of that PR (no pending changesets left → it publishes directly).
  cut-release:
    needs: checks
    if: github.event_name == 'workflow_dispatch' && inputs.cut-release == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Open version-bump PR into master
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          branch: master
          commit: 'chore: version packages'
          title: 'chore: version packages'
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Real npm publish (dist-tag `canary`) of whatever pending .changeset/*.md
  # files exist on this branch — replaces the old manual pkg.pr.new checkbox
  # flow so examples/*/package.json can commit a literal, git-tracked
  # `"@symbiote-native/<pkg>": "canary"` dependency that always resolves live,
  # something pkg.pr.new's ephemeral per-commit URLs couldn't give us.
  #
  # Deliberately does NOT try to scope this to "only the packages a PR
  # touched" — an earlier version auto-detected changed packages via git diff
  # and synthesized a throwaway changeset for exactly those, but
  # `updateInternalDependencies: patch` (.changeset/config.json) still
  # cascades a patch bump to every OTHER package that depends on one of them
  # (e.g. bumping `angular` cascades to `navigation`/`sensors`/`slider`/
  # `splash-screen`, all of which pin it via workspace:*) — so the "selected"
  # set was never the actual published set anyway, it just looked like it
  # was. Publishing whatever changesets + cascade decide, same as a real
  # release, is honest about what actually happens and needs a real
  # `.changeset/*.md` (from `pnpm changeset`) to publish anything — which is
  # already required discipline for a real release, so no extra burden.
  #
  # Two ways in: automatic (workflow_run, gated on `CI` having passed for the
  # PR) or manual (workflow_dispatch with publish-canary: true, for a branch
  # with no open PR, or to retry). Both still go through the `canary-publish`
  # GitHub Environment's required-reviewer approval before anything actually
  # hits the registry.
  #
  # `needs: checks` gates the workflow_dispatch path on Lint/Typecheck/Test —
  # without it, a manual dispatch published straight to npm regardless of
  # whether those passed. The `checks` job's own `if:` never runs it for
  # workflow_run (ci.yml already covered that PR push), so its result there
  # is 'skipped', not 'success' — the explicit needs.checks.result check below
  # tolerates that instead of the implicit success()-only gate `needs:` alone
  # would apply, which would silently skip this job on every workflow_run.
  publish-canary:
    needs: checks
    if: >-
      (needs.checks.result == 'success' || needs.checks.result == 'skipped') &&
      (
        (github.event_name == 'workflow_run' &&
          github.event.workflow_run.event == 'pull_request' &&
          github.event.workflow_run.conclusion == 'success') ||
        (github.event_name == 'workflow_dispatch' && inputs.publish-canary == true)
      )
    runs-on: ubuntu-latest
    environment: canary-publish
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run prepublish-build

      # npm's OIDC trust (`npm trust github`, see trust-publishers.mjs) can only
      # be registered for a package that already exists on the registry — with
      # no fixed "selected" set (cascade can touch any publishable package),
      # this checks ALL of them up front rather than guessing which ones a
      # given changeset might cascade into.
      - name: Preflight — verify npm trust for every publishable package
        run: node scripts/check-canary-trust.mjs

      - name: Publish canary (npm, tag canary)
        run: pnpm run release:canary

name: Release

on:
  push:
    branches:
      - master
  # Drives publish-canary below — reacts to the CI workflow's own completion
  # instead of re-declaring `pull_request` here, which would call checks.yml
  # a second time for every PR push (ci.yml already covers pull_request; there
  # is no cross-workflow `needs:` to gate on its run directly, so workflow_run
  # is the mechanism that avoids running lint/typecheck/test twice per push).
  # Caveat: workflow_run only fires from the copy of this trigger present on
  # the repo's DEFAULT branch — a PR from a non-default branch won't exercise
  # this path until the change is merged.
  workflow_run:
    workflows: ['CI']
    types: [completed]
  workflow_dispatch:
    inputs:
      cut-release:
        description: 'Cut a release: open a version-bump PR from this branch into master (run this dispatched from develop)'
        type: boolean
        default: false
      canary-packages:
        description: 'Manually publish canary for these packages (comma-separated short names, e.g. "react,vue") — leave empty to skip'
        type: string
        default: ''

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  # Same three jobs ci.yml runs for fast PR feedback, re-run here so `needs:
  # checks` below is a real gate for `release`/`cut-release` (push /
  # workflow_dispatch only — those events never went through ci.yml, so this
  # is genuinely the first and only checks.yml run for them). Restricted to
  # those two events so it does NOT also fire on workflow_run — publish-canary
  # below gates on ci.yml's own conclusion instead of needing this job, which
  # is the whole point of using workflow_run rather than a local `needs:`.
  checks:
    name: Checks
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/checks.yml

  release:
    needs: checks
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Opens/updates a "chore: version packages" PR when unreleased changesets
      # exist on master; once that PR is merged, this same step runs `publish`
      # instead and pushes the bumped packages to npm.
      - name: Version or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
          commit: 'chore: version packages'
          title: 'chore: version packages'
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # changesets/action creates one GitHub Release per published package by
      # default (no built-in grouping option exists as of 2026 - see
      # changesets/action#504, still unmerged). We disable that above and
      # create a single dated release listing every package bumped in this run.
      - name: Create combined GitHub release
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          TAG="release-${DATE}-${{ github.run_number }}"
          BODY=$(echo "$PACKAGES" | node -e '
            const pkgs = JSON.parse(require("fs").readFileSync(0, "utf8"));
            console.log(pkgs.map(p => `- ${p.name}@${p.version}`).join("\n"));
          ')
          gh release create "$TAG" \
            --target "${{ github.sha }}" \
            --title "Release ${DATE}" \
            --notes "$BODY"

  # Manual: dispatched with the `develop` branch selected, opens a version-bump
  # PR from that branch straight into master (changesets/action's `branch`
  # input sets the PR's base — the checkout stays on whatever branch the
  # dispatch ran against, so no hardcoded ref here). Only versions, never
  # publishes: the existing push-to-master `release` job below picks up the
  # merge of that PR (no pending changesets left → it publishes directly).
  cut-release:
    needs: checks
    if: github.event_name == 'workflow_dispatch' && inputs.cut-release == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Open version-bump PR into master
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          branch: master
          commit: 'chore: version packages'
          title: 'chore: version packages'
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Real npm publish (dist-tag `canary`) of whichever @symbiote-native/* package(s)
  # a PR touches — replaces the old manual pkg.pr.new checkbox flow so
  # examples/*/package.json can commit a literal, git-tracked
  # `"@symbiote-native/<pkg>": "canary"` dependency that always resolves live,
  # something pkg.pr.new's ephemeral per-commit URLs couldn't give us. Two ways in:
  # automatic (workflow_run, gated on `CI` having passed for the PR) or manual
  # (workflow_dispatch with the canary-packages input, for a republish with no code
  # change, or publishing off a branch with no open PR). Both still go through the
  # `canary-publish` GitHub Environment's required-reviewer approval before
  # anything actually hits the registry.
  publish-canary:
    if: >-
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.event == 'pull_request' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.pull_requests[0] != null) ||
      (github.event_name == 'workflow_dispatch' && inputs.canary-packages != '')
    runs-on: ubuntu-latest
    environment: canary-publish
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run prepublish-build

      # Auto-detects which publishable package(s) the PR touches instead of a
      # human ticking checkboxes — fails fast if it touches none. base/head come
      # from the workflow_run event's own pull_requests[] entry (empty for a fork
      # PR — GitHub withholds it there for security, so a fork-originated canary
      # publish won't run until this is revisited).
      - name: Resolve changed publishable packages (auto, from PR diff)
        id: dirs-auto
        if: github.event_name == 'workflow_run'
        env:
          CANARY_BASE_SHA: ${{ github.event.workflow_run.pull_requests[0].base.sha }}
          CANARY_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: node scripts/select-canary-dirs.mjs

      # Manual override: publish whatever the dispatcher typed, regardless of what
      # actually changed — for a republish (no code change) or a branch with no
      # open PR to diff against.
      - name: Resolve selected publishable packages (manual input)
        id: dirs-manual
        if: github.event_name == 'workflow_dispatch'
        env:
          CANARY_PACKAGES_INPUT: ${{ inputs.canary-packages }}
        run: node scripts/resolve-manual-canary-packages.mjs

      # `changeset version --snapshot` only acts on packages that already have a
      # real .changeset/*.md file — it has no idea about the packages resolved
      # above, so a branch with no committed changeset would otherwise publish
      # nothing. This writes a throwaway one for exactly the selected packages;
      # it's never committed or pushed, just consumed by release:canary below.
      - name: Write ephemeral changeset for selected packages
        env:
          CANARY_PACKAGES: ${{ steps.dirs-auto.outputs.packages || steps.dirs-manual.outputs.packages }}
        run: node scripts/write-canary-changeset.mjs

      # npm's OIDC trust (`npm trust github`, see trust-publishers.mjs) can only be
      # registered for a package that already exists on the registry — refuse to
      # let a never-published package reach `changeset publish` and 404 there.
      - name: Preflight — verify npm trust for selected packages
        env:
          CANARY_PACKAGES: ${{ steps.dirs-auto.outputs.packages || steps.dirs-manual.outputs.packages }}
        run: node scripts/check-canary-trust.mjs

      - name: Publish canary (npm, tag canary)
        run: pnpm run release:canary

name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      cut-release:
        description: 'Cut a release: open a version-bump PR from this branch into master (run this dispatched from develop)'
        type: boolean
        default: false
      # BEGIN GENERATED CANARY PACKAGE INPUTS — do not edit by hand, run
      # `pnpm run sync:release-config` (derives this list from
      # publishablePackageEntries(), the same package discovery
      # `select-canary-dirs.mjs`/`trust-publishers.mjs` use).
      android:
        description: '@symbiote-native/android'
        type: boolean
        default: false
      angular:
        description: '@symbiote-native/angular'
        type: boolean
        default: false
      components:
        description: '@symbiote-native/components'
        type: boolean
        default: false
      css-parser:
        description: '@symbiote-native/css-parser'
        type: boolean
        default: false
      engine:
        description: '@symbiote-native/engine'
        type: boolean
        default: false
      navigation:
        description: '@symbiote-native/navigation'
        type: boolean
        default: false
      react:
        description: '@symbiote-native/react'
        type: boolean
        default: false
      slider:
        description: '@symbiote-native/slider'
        type: boolean
        default: false
      splash-screen:
        description: '@symbiote-native/splash-screen'
        type: boolean
        default: false
      test-utils:
        description: '@symbiote-native/test-utils'
        type: boolean
        default: false
      vue:
        description: '@symbiote-native/vue'
        type: boolean
        default: false
      # END GENERATED CANARY PACKAGE INPUTS

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  # Same three jobs ci.yml runs for fast PR feedback, re-run here so `needs:
  # checks` below is a real gate on THIS workflow run — GitHub Actions has no
  # cross-workflow `needs`, so gating release/publish-canary on ci.yml's own
  # run isn't possible; calling the shared workflow again is the mechanism.
  checks:
    name: Checks
    uses: ./.github/workflows/checks.yml

  release:
    needs: checks
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Opens/updates a "chore: version packages" PR when unreleased changesets
      # exist on master; once that PR is merged, this same step runs `publish`
      # instead and pushes the bumped packages to npm.
      - name: Version or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
          commit: 'chore: version packages'
          title: 'chore: version packages'
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # changesets/action creates one GitHub Release per published package by
      # default (no built-in grouping option exists as of 2026 - see
      # changesets/action#504, still unmerged). We disable that above and
      # create a single dated release listing every package bumped in this run.
      - name: Create combined GitHub release
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          TAG="release-${DATE}-${{ github.run_number }}"
          BODY=$(echo "$PACKAGES" | node -e '
            const pkgs = JSON.parse(require("fs").readFileSync(0, "utf8"));
            console.log(pkgs.map(p => `- ${p.name}@${p.version}`).join("\n"));
          ')
          gh release create "$TAG" \
            --target "${{ github.sha }}" \
            --title "Release ${DATE}" \
            --notes "$BODY"

  # Manual: dispatched with the `develop` branch selected, opens a version-bump
  # PR from that branch straight into master (changesets/action's `branch`
  # input sets the PR's base — the checkout stays on whatever branch the
  # dispatch ran against, so no hardcoded ref here). Only versions, never
  # publishes: the existing push-to-master `release` job below picks up the
  # merge of that PR (no pending changesets left → it publishes directly).
  cut-release:
    needs: checks
    if: github.event_name == 'workflow_dispatch' && inputs.cut-release == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Open version-bump PR into master
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          branch: master
          commit: 'chore: version packages'
          title: 'chore: version packages'
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Manual, on-demand preview publish of whichever @symbiote-native/*
  # packages you tick (whichever branch you run this workflow against),
  # WITHOUT touching the real npm registry at all — pkg.pr.new hosts its own
  # npm-compatible URLs, so nothing here is ever visible on npmjs.com, no
  # dist-tag, no version bump, nothing to clean up. Installable in
  # .examples/*/examples/* to e2e-test the REAL packed tarball (catches
  # "files" allowlist bugs etc. that workspace:* linking can't reproduce)
  # without touching the real release line. Requires the pkg.pr.new GitHub
  # App installed on this repo (github.com/apps/pkg-pr-new).
  publish-canary:
    needs: checks
    if: github.event_name == 'workflow_dispatch' && inputs.cut-release != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Reads every ticked checkbox generically (no hardcoded package list to
      # keep in sync) so a new per-package input just works.
      - name: Determine selected packages
        id: selected
        uses: actions/github-script@v7
        with:
          script: |
            const inputs = context.payload.inputs || {};
            const selected = Object.entries(inputs)
              .filter(([, value]) => value === 'true' || value === true)
              .map(([key]) => key);
            if (selected.length === 0) {
              core.setFailed('No package checkbox was ticked — select at least one package to publish a canary for.');
              return;
            }
            core.setOutput('packages', selected.join(','));

      - run: pnpm run prepublish-build

      # pkg-pr-new@0.0.75 has no prebuilt-tarball mode yet (that's an unreleased main-branch
      # feature) — its own glob only matches directories, and it packs them itself, defaulting
      # to `npm pack` unless told otherwise. `--pnpm` makes it use `pnpm pack`, which — unlike
      # `npm pack` — resolves each package's `publishConfig` override (ships `build/`, not the
      # in-repo `src/*.ts` entry).
      - name: Resolve selected package directories
        id: dirs
        env:
          CANARY_PACKAGES: ${{ steps.selected.outputs.packages }}
        run: node scripts/select-canary-dirs.mjs

      - name: Publish canary (pkg.pr.new)
        run: pnpm exec pkg-pr-new publish --pnpm ${{ steps.dirs.outputs.dirs }}

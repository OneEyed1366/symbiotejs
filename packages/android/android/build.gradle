// @symbiotejs/android — autolinked Android host-shim library. Built as a subproject of the
// consuming app, so it reads the app's pinned SDK/Kotlin versions from rootProject.ext
// (the same anchors the app's build.gradle defines), falling back to sane defaults when
// built in isolation.

apply plugin: "com.android.library"
apply plugin: "org.jetbrains.kotlin.android"

def safeExtGet(prop, fallback) {
  rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

android {
  namespace "com.symbiote.android"
  compileSdk safeExtGet("compileSdkVersion", 36)

  defaultConfig {
    minSdk safeExtGet("minSdkVersion", 24)
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = "17"
  }
}

repositories {
  google()
  mavenCentral()
}

dependencies {
  // Version-less: the consuming app's React Native Gradle plugin pins react-android, and
  // androidx.core ships the WindowInsetsCompat ime() API we read the keyboard inset from.
  implementation "com.facebook.react:react-android"
  implementation "androidx.core:core-ktx:1.13.1"
}
